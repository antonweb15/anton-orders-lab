name: PHP CI

on:
  push:
    branches: [ main ]  # пайплайн запускается при пуше в main

jobs:
  test:

    runs-on: ubuntu-latest  # виртуальная машина GitHub Actions

    steps:

      # 1️⃣ Скачать код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Установить PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          coverage: none

      # 3️⃣ Установить зависимости через Composer
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      # 3.5️⃣ Установить Node.js и собрать ассеты (Vite)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM dependencies
        run: npm install

      - name: Build assets
        run: npm run build

      # 4️⃣ Set APP_KEY
      - name: Set APP_KEY
        run: echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env

      # 5 Запустить тесты
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --colors=always --testdox

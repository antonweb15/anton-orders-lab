name: PHP CI

on:
  push:
    branches: [ main ]  # pipeline runs on push to main

jobs:
  test:

    runs-on: ubuntu-latest  # GitHub Actions virtual machine

    steps:

      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          coverage: none

      # 3. Install dependencies via Composer
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      # 3.5. Setup Node.js and build assets (Vite)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM dependencies
        run: npm install

      - name: Build assets
        run: npm run build

      # 4. Set APP_KEY
      - name: Set APP_KEY
        run: echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env

      # 5. Run PHPUnit tests
      - name: Run PHPUnit tests
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --force
          vendor/bin/phpunit tests/Feature/SimpleFeatureTest.php tests/Feature/ApiCachingTest.php --colors=always --testdox
